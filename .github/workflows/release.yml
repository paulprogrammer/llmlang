name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            artifact_name: llmlang-linux-x86_64
          - os: macos
            arch: arm64
            runner: macos-latest
            artifact_name: llmlang-macos-arm64
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            artifact_name: llmlang-linux-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install LLVM (Linux)
      if: matrix.os == 'linux'
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 22
        echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV
        echo "/usr/lib/llvm-22/bin" >> $GITHUB_PATH

    - name: Install LLVM (macOS)
      if: matrix.os == 'macos'
      run: |
        brew install llvm
        echo "LLVM_SYS_221_PREFIX=$(brew --prefix llvm)" >> $GITHUB_ENV
        echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

    - name: Install Linux Dependencies
      if: matrix.os == 'linux'
      run: sudo apt-get update && sudo apt-get install -y libclang-common-22-dev libpolly-22-dev

    - name: Build release binaries
      run: cargo build --release --verbose

    - name: Run tests (Rust)
      run: cargo test --release --verbose

    - name: Run tests (Self-hosted)
      run: ./llm-test

    - name: Prepare assets
      run: |
        mkdir -p dist
        cp target/release/llmlang dist/
        cp target/release/llm-mcp dist/
        cp llm-clang dist/
        tar -czvf ${{ matrix.artifact_name }}.tar.gz -C dist .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          llmlang-*.tar.gz
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
